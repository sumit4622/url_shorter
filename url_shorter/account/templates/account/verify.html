{% extends "base.html" %} {% block content %}

<div
  class="flex min-h-screen bg-gray-800 flex-col justify-center px-6 py-12 lg:px-8"
>
  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <h2 class="text-center text-2xl/9 font-bold text-white">Verify OTP</h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form action="{% url 'verify_otp' %}" method="POST" class="space-y-6">
      {% csrf_token %}

      <div>
        <label for="otp" class="block text-sm font-medium text-gray-100"
          >Enter OTP</label
        >
        <input
          id="otp"
          type="text"
          name="otp"
          required
          class="mt-2 block w-full rounded-md bg-white/5 px-3 py-1.5 text-white outline-white/10 focus:outline-indigo-500"
        />
      </div>

      <div>
        <label
          for="new_password"
          class="block text-sm font-medium text-gray-100"
          >New Password</label
        >
        <input
          id="new_password"
          type="password"
          name="new_password"
          required
          class="mt-2 block w-full rounded-md bg-white/5 px-3 py-1.5 text-white outline-white/10 focus:outline-indigo-500"
        />
      </div>

      <button
        type="submit"
        class="w-full rounded-md bg-indigo-500 py-2 font-semibold text-white hover:bg-indigo-400"
      >
        Reset Password
      </button>
    </form>
  </div>
</div>

{% endblock %}
