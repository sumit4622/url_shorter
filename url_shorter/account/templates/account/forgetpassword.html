{% extends "base.html" %} {% block content %}

<div
  class="flex min-h-screen bg-gray-800 flex-col justify-center px-6 py-12 lg:px-8"
>
  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <h2
      class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-white"
    >
      Reset Password
    </h2>
    <p class="mt-2 text-center text-sm text-gray-400">
      Enter your email and we'll send you an OTP.
    </p>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form action="{% url 'forget_password' %}" method="POST" class="space-y-6">
      {% csrf_token %}
      <div>
        <label for="email" class="block text-sm/6 font-medium text-gray-100"
          >Email address</label
        >
        <div class="mt-2">
          <input
            id="email"
            type="email"
            name="email"
            required
            class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 outline-white/10 placeholder:text-gray-500 focus:outline-indigo-500 sm:text-sm/6"
            placeholder="you@example.com"
          />
        </div>
      </div>

      <div>
        <button
          type="submit"
          class="flex w-full justify-center rounded-md bg-indigo-500 px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-indigo-400"
        >
          Send OTP
        </button>
      </div>

      <div class="text-center">
        <a
          href="{% url 'login_user' %}"
          class="text-sm font-semibold text-indigo-400 hover:text-indigo-300"
        >
          Back to Sign In
        </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
